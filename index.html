<!DOCTYPE html>
<html>
<head>
    <title>AI SaaS MVP</title>
</head>

<body>
    <h1>AI SaaS MVP</h1>

    <button onclick="sendMessage()">
        Send Request to Backend
    </button>

    <p id="response">No response yet</p>

    <script>
        async function sendMessage() {
            const res = await fetch("https://5dttu4mg9f.execute-api.ap-south-1.amazonaws.com/prod/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                }
            });

            const data = await res.json();

            document.getElementById("response").innerText =
                data.response;
        }
    </script>
</body>
</html>
